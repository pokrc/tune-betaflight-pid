<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Tune Betaflight PID from Blackbox Logs</title>
  <desc id="desc">A technical workflow diagram showing Blackbox data flowing through evidence gates to a safe Betaflight CLI stage.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06151f"/>
      <stop offset="1" stop-color="#102c32"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb800"/>
      <stop offset="1" stop-color="#ff6838"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#8bc6c3" stroke-opacity=".09"/>
    </pattern>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <circle cx="1090" cy="110" r="270" fill="#20dbcf" fill-opacity=".07"/>
  <circle cx="180" cy="590" r="320" fill="#ff8a3d" fill-opacity=".08"/>

  <rect x="74" y="58" width="328" height="38" rx="19" fill="#d6fff8" fill-opacity=".1" stroke="#9ff5e8" stroke-opacity=".45"/>
  <text x="96" y="83" fill="#b9fff3" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" letter-spacing="2">POK_RC · OPEN FLIGHT-DATA WORKFLOW</text>

  <text x="74" y="190" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="800" letter-spacing="-2">BLACKBOX</text>
  <text x="455" y="190" fill="url(#accent)" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="800">→</text>
  <text x="548" y="190" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="800" letter-spacing="-2">EVIDENCE</text>
  <text x="74" y="268" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="800" letter-spacing="-2">SAFE CLI</text>
  <text x="74" y="314" fill="#b9d6d9" font-family="Arial, Helvetica, sans-serif" font-size="25">Betaflight .bbl analysis that refuses to guess.</text>
  <text x="74" y="350" fill="#8ba8ac" font-family="Arial, Helvetica, sans-serif" font-size="20">Local-first · RPM-gated · One reviewable tuning stage at a time</text>

  <g transform="translate(74 420)">
    <rect width="282" height="142" rx="18" fill="#0b2630" stroke="#4c7880" stroke-opacity=".65"/>
    <path d="M25 93 C47 58 62 119 83 82 S122 43 147 84 S192 122 220 56 S246 88 260 47" fill="none" stroke="#40e3d1" stroke-width="5" stroke-linecap="round"/>
    <text x="24" y="34" fill="#eaffff" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">1 · RAW FLIGHT LOG</text>
    <text x="24" y="126" fill="#88adb1" font-family="Arial, Helvetica, sans-serif" font-size="17">.bbl + configuration context</text>
  </g>
  <path d="M382 491 H463" fill="none" stroke="#ff9b38" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <g transform="translate(482 420)">
    <rect width="282" height="142" rx="18" fill="#0b2630" stroke="#4c7880" stroke-opacity=".65"/>
    <circle cx="50" cy="73" r="25" fill="none" stroke="#ffb13e" stroke-width="5"/>
    <path d="M39 73l8 9 17-22" fill="none" stroke="#ffb13e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="91" y="68" fill="#eaffff" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">2 · HARD GATES</text>
    <text x="91" y="98" fill="#9bc1c3" font-family="Arial, Helvetica, sans-serif" font-size="17">RPM · impacts · windows</text>
  </g>
  <path d="M790 491 H871" fill="none" stroke="#ff9b38" stroke-width="6" stroke-linecap="round"/>
  <path d="M871 491l-17-13m17 13l-17 13" fill="none" stroke="#ff9b38" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(890 420)">
    <rect width="316" height="142" rx="18" fill="#102a27" stroke="#55e1c3" stroke-opacity=".75"/>
    <text x="24" y="34" fill="#eaffff" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">3 · REVIEWABLE STAGE</text>
    <text x="24" y="76" fill="#8ef0dc" font-family="Menlo, Monaco, monospace" font-size="17">set dshot_bidir = ON</text>
    <text x="24" y="104" fill="#8ef0dc" font-family="Menlo, Monaco, monospace" font-size="17">set rpm_filter_harmonics = 3</text>
    <text x="24" y="128" fill="#80a8a5" font-family="Arial, Helvetica, sans-serif" font-size="14">only when evidence and hardware gates pass</text>
  </g>
</svg>
