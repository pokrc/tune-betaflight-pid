name: Validate adaptive tuning policy

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install runtime dependency
        run: python -m pip install -r requirements.txt
      - name: Validate scripts
        run: |
          python -m py_compile tune-betaflight-pid/scripts/*.py
          python tune-betaflight-pid/scripts/self_test.py
      - name: Validate Skill contract
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path("tune-betaflight-pid/SKILL.md").read_text(encoding="utf-8")
          assert text.startswith("---\nname: tune-betaflight-pid\n")
          assert "recommended_cli.txt" in text
          assert "rpm_validation" in text
          PY
